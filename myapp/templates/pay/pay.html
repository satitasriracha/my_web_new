{% extends 'base.html' %}

{% block content %}

<style>
.box {
    background: #fff;
    margin: 40px;
    padding: 20px;
    border-radius: 12px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    text-align: center;
}

th {
    background: #ffe5ec;
}

tr:hover {
    background: #f9f9f9;
}

button {
    padding: 6px 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.view { background: #a0c4ff; }
.ok { background: #80ed99; }

/* MODAL */
.modal {
    display: none;
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.5);
    z-index:999;
}

/* 🔥 ใหญ่ขึ้น */
.mbox {
    position: relative;
    background:#fff;
    width: 650px;
    margin: 80px auto;
    padding: 25px;
    border-radius:16px;
    text-align:center;
}

/* 🔥 รูปใหญ่ */
.slip-img {
    width: 100%;
    max-height: 450px;
    object-fit: cover;
    border-radius: 12px;
}

/* 🔥 ปุ่มปิด */
.close-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #ff4d4d;
    color: white;
    border: none;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    cursor: pointer;
    font-weight: bold;
}
</style>

<div class="box">
<h2>💰 รอยืนยันการชำระเงิน</h2>

<table>
<tr>
    <th>รหัสขาย</th>
    <th>ลูกค้า</th>
    <th>สลิป</th>
    <th>ยืนยัน</th>
</tr>

{% for s in sales %}
<tr id="r{{s.id}}">

    <td><strong>{{ s.sale_code }}</strong></td>

    <td>{{ s.customer.name }}</td>

    <td>
        <button class="view" onclick="openM({{s.id}})">🔍 ดู</button>
    </td>

    <td>
        <button class="ok" onclick="confirmPay({{s.id}})">✅ ยืนยัน</button>
    </td>

</tr>
{% empty %}
<tr>
    <td colspan="4">ไม่มีรายการ</td>
</tr>
{% endfor %}
</table>
</div>

<!-- 🔥 MODAL -->
<div class="modal" id="m">
    <div class="mbox">

        <button class="close-btn" onclick="closeM()">✖</button>

        <p id="t"></p>

        <hr>

        <img id="img" class="slip-img">

    </div>
</div>

<script>
let cur = null;

function openM(id){
    cur = id;

    fetch('/pay/' + id + '/')
    .then(r => r.json())
    .then(d => {
        document.getElementById('t').innerText =
            "Order: " + d.id + " | " + d.cus + " | " + d.date;

        document.getElementById('img').src = d.slip;

        document.getElementById('m').style.display = 'block';
    })
}

function closeM(){
    document.getElementById('m').style.display = 'none';
}

function confirmPay(id){
    if(!confirm("ยืนยันการชำระเงินใช่ไหม?")) return;

    fetch('/pay/ok/' + id + '/', {
        method:'POST',
        headers:{'X-CSRFToken': getC('csrftoken')}
    })
    .then(r=>r.json())
    .then(d=>{
        if(d.ok){
            location.reload();  // 🔥 อัปเดตทันที
        }else{
            alert(d.error);
        }
    })
}

function getC(n){
    let v=null;
    document.cookie.split(';').forEach(c=>{
        c=c.trim();
        if(c.startsWith(n+'=')){
            v=decodeURIComponent(c.substring(n.length+1));
        }
    });
    return v;
}
</script>

{% endblock %}
