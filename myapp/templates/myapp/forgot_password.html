{% load static %}
<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>ลืมรหัสผ่าน - Charcoal Home Green</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-image: url("{% static 'images/loginpage.webp' %}");
            background-size: cover;
            background-position: center;
            margin: 0;
            padding: 0;
        }

        .login-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.45);
            width: 320px;
            padding: 30px 25px;
            border-radius: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
        }

        .login-box h2 {
            text-align: center;
            font-size: 26px;
            margin-bottom: 25px;
            font-weight: bold;
            color: #2b1e1e;
        }

        .login-box label {
            font-size: 15px;
            color: #555;
            display: block;
            margin: 12px 0 5px;
        }

        .login-box input[type="text"] {
            width: 100%;
            padding: 10px;
            border: none;
            border-bottom: 1px solid #aaa;
            background: transparent;
            outline: none;
            font-size: 14px;
        }

        .login-box button {
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            background: linear-gradient(to bottom, #cfcfcf, #888888);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            font-size: 16px;
        }

        .message {
            margin-top: 10px;
            font-size: 14px;
            text-align: center;
            color: green;
        }

        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="login-box">
            <h2>ลืมรหัสผ่าน</h2>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">ส่งลิงก์รีเซ็ต</button>
            </form>

            {% if messages %}
            {% for msg in messages %}
            <p class="{% if msg.tags == 'error' %}error{% else %}message{% endif %}">{{ msg }}</p>
            {% endfor %}
            {% endif %}
        </div>
    </div>

</body>

</html>
