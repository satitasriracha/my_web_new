{% extends "base.html" %}
{% block content %}
<h2>ลบการยืนยันการชำระเงิน</h2>
<p>คุณแน่ใจหรือไม่ว่าต้องการลบ <strong>{{ confirmation }}</strong>?</p>

<form method="post">
    {% csrf_token %}

    <a href="{% url 'myapp:payment_confirmation_list' %}" class="btn btn-secondary">ยกเลิก</a>
</form>
{% endblock %}
