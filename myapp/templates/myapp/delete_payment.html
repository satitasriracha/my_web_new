{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <h2 class="mb-4">ลบข้อมูลการชำระเงิน</h2>
    <p>คุณแน่ใจหรือไม่ว่าต้องการลบรายการชำระเงินของ <strong>{{ payment.sale }}</strong> ?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">🗑️ ยืนยันการลบ</button>
        <a href="{% url 'myapp:payment_list' %}" class="btn btn-secondary">ยกเลิก</a>
    </form>
</div>
{% endblock %}
