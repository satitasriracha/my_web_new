{% extends 'base.html' %}

{% block content %}
<div class="add-section">
    <h2>{% if edit %}แก้ไข{% else %}เพิ่ม{% endif %} รายการขายสินค้า</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">{% if edit %}อัปเดต{% else %}บันทึก{% endif %}</button>
        <a href="{% url 'myapp:sale_item_list' %}" class="btn btn-secondary">ยกเลิก</a>
    </form>
</div>
{% endblock %}
