{% extends 'base.html' %} {% block content %}
<div class="add-section">
  <h2>
    {% if form.instance.pk %}✏️ แก้ไขอัตราค่าขนส่ง{% else %}➕
    เพิ่มอัตราค่าขนส่ง{% endif %}
  </h2>

  <form method="post">
    {% csrf_token %}

    <div class="form-group">
      <label for="id_weight">น้ำหนัก (กก.)</label>
      {{ form.weight }}
    </div>

    <div class="form-group">
      <label for="id_rate">อัตราค่าขนส่ง (บาท)</label>
      {{ form.rate }}
    </div>
    <br />

    <button type="submit" class="btn btn-success">💾 บันทึก</button>
    <a href="{% url 'myapp:shipping_rate_list' %}" class="btn btn-secondary"
      >ย้อนกลับ</a
    >
  </form>
</div>

<!-- ✅ SweetAlert -->
{% if messages %}
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  {% for message in messages %}
  Swal.fire({
      icon: "{% if message.tags == 'success' %}success{% else %}error{% endif %}",
      title: "{{ message|escapejs }}",
      text: "{% if message.tags == 'error' %}โปรดตรวจสอบข้อมูลที่กรอกอีกครั้ง{% endif %}",
      confirmButtonText: "ตกลง"
  });
  {% endfor %}
</script>
{% endif %} {% endblock %}
