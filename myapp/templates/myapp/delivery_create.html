<style>
/* พื้นหลัง */
.modal-content {
    border-radius: 16px;
    border: none;
    overflow: hidden;
}

/* header */
.modal-header {
    background: linear-gradient(135deg, #2ecc71, #27ae60);
    color: white;
    border-bottom: none;
}

.modal-title {
    font-weight: 700;
}

/* body */
.modal-body {
    background: #f9fbfd;
}

/* input */
.form-control,
.form-select {
    border-radius: 10px;
    border: 1px solid #ddd;
    padding: 10px;
    transition: 0.3s;
}

.form-control:focus,
.form-select:focus {
    border-color: #2ecc71;
    box-shadow: 0 0 0 0.15rem rgba(46, 204, 113, 0.25);
}

/* label */
.form-label {
    font-weight: 600;
}

/* ปุ่ม */
.btn-success {
    background: linear-gradient(135deg, #2ecc71, #27ae60);
    border: none;
    border-radius: 10px;
}

.btn-success:hover {
    transform: scale(1.05);
}

/* animation */
.modal.fade .modal-dialog {
    transform: translateY(-20px);
    transition: all 0.3s ease;
}

.modal.show .modal-dialog {
    transform: translateY(0);
}
</style>


<div class="modal fade" id="deliveryModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">

      <!-- HEADER -->
      <div class="modal-header">
        <h5 class="modal-title">🚚 เพิ่มการจัดส่ง</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <!-- BODY -->
      <div class="modal-body">

        <form method="POST" action="{% url 'myapp:delivery_create' %}">
          {% csrf_token %}

          <div class="row g-3">

            <!-- เลือก sale -->
            <div class="col-md-6">
              <label class="form-label">📦 คำสั่งซื้อ</label>
              <select name="sale_id" class="form-select" required>
                <option value="">-- เลือก --</option>
                {% for sale in sales %}
                  <option value="{{ sale.id }}">
                    #{{ sale.id }} - {{ sale.customer.name }}
                  </option>
                {% endfor %}
              </select>
            </div>

            <!-- พนักงาน -->
            <div class="col-md-6">
              <label class="form-label">👨‍💼 พนักงาน</label>
              <select name="employee_id" class="form-select">
                {% for emp in employees %}
                  <option value="{{ emp.id }}">{{ emp.username }}</option>
                {% endfor %}
              </select>
            </div>

            <!-- ที่อยู่ -->
            <div class="col-12">
              <label class="form-label">📍 ที่อยู่จัดส่ง</label>
              <textarea name="address" class="form-control" rows="3" required></textarea>
            </div>

            <!-- สถานะ -->
            <div class="col-md-6">
              <label class="form-label">📊 สถานะ</label>
              <select name="status" class="form-select">
                <option value="pending">🟡 รอดำเนินการ</option>
                <option value="shipping">🚚 กำลังจัดส่ง</option>
                <option value="success">✅ สำเร็จ</option>
              </select>
            </div>

          </div>

          <!-- footer -->
          <div class="mt-4 text-end">
            <button type="submit" class="btn btn-success px-4">
              💾 บันทึก
            </button>
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
              ยกเลิก
            </button>
          </div>

        </form>

      </div>

    </div>
  </div>
</div>
